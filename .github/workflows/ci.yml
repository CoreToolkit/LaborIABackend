name: CI · Security Gate · Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  IMAGE_NAME: ${{ github.repository }}:${{ github.sha }}
  GATE_URL: http://localhost:8000

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Tests + coverage
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Tests (≥80 % coverage)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db
      JWT_SECRET: ci-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest --cov=. --cov-report=term-missing --cov-fail-under=80

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Security Gate (Trivy → Sentinel)
  # ─────────────────────────────────────────────────────────────────────────
  security-gate:
    name: Security Gate (Trivy + Sentinel)
    runs-on: ubuntu-latest
    # Run on every PR and on pushes to main/develop
    needs: test
    permissions:
      pull-requests: write   # needed to post the PR comment

    steps:
      - uses: actions/checkout@v4

      # ── Build the app image ──────────────────────────────────────────────
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME .

      # ── Install Trivy ────────────────────────────────────────────────────
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      # ── Scan with Trivy (JSON + table for logs) ──────────────────────────
      - name: Scan image with Trivy
        run: |
          trivy image \
            --format json \
            --output trivy_report.json \
            --exit-code 0 \
            $IMAGE_NAME

          # Human-readable summary in the job log
          trivy image \
            --format table \
            --exit-code 0 \
            $IMAGE_NAME

      # ── Start Sentinel gate (AI_DISABLED=true → Ollama off) ──────────────
      - name: Start Sentinel gate
        run: |
          pip install fastapi uvicorn httpx pydantic --quiet
          cd Sentinel-AI-CD/app && \
            AI_DISABLED=true uvicorn main:app --port 8000 &
          # Wait until the health endpoint responds
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done
        env:
          AI_DISABLED: "true"

      # ── Call the gate via trivy_to_gate.py ───────────────────────────────
      - name: Run Sentinel security gate
        id: gate
        # exit 2 (WARNING) → we capture it and let the pipeline continue
        # exit 1 (REJECTED) → step fails → pipeline stops
        run: |
          set +e
          python3 Sentinel-AI-CD/pipeline/trivy_to_gate.py \
            --report trivy_report.json \
            --image  "$IMAGE_NAME" \
            --gate   "$GATE_URL" \
            --dockerfile ./Dockerfile
          GATE_EXIT=$?
          set -e

          case $GATE_EXIT in
            0) echo "gate_decision=APPROVED" >> $GITHUB_OUTPUT ;;
            2) echo "gate_decision=WARNING"  >> $GITHUB_OUTPUT ;;
            1) echo "gate_decision=REJECTED" >> $GITHUB_OUTPUT ; exit 1 ;;
            *) echo "gate_decision=ERROR"    >> $GITHUB_OUTPUT ; exit $GATE_EXIT ;;
          esac

      # ── Build PR comment with vulnerability summary ───────────────────────
      - name: Build vulnerability summary
        id: summary
        if: github.event_name == 'pull_request'
        run: |
          python3 - <<'EOF'
          import json, os

          with open("trivy_report.json") as f:
              data = json.load(f)

          from collections import Counter
          counts = Counter()
          vulns_detail = []

          for result in data.get("Results", []):
              for v in result.get("Vulnerabilities") or []:
                  sev = v.get("Severity", "UNKNOWN").upper()
                  counts[sev] += 1
                  if sev in ("CRITICAL", "HIGH"):
                      vulns_detail.append(
                          f"| `{v.get('VulnerabilityID','-')}` "
                          f"| {sev} "
                          f"| {v.get('PkgName','-')} "
                          f"| {v.get('InstalledVersion','-')} "
                          f"| {v.get('Title','')[:60]} |"
                      )

          decision = os.environ.get("GATE_DECISION", "UNKNOWN")
          icon = {"APPROVED": "✅", "WARNING": "⚠️", "REJECTED": "❌"}.get(decision, "❓")

          lines = [
              f"## {icon} Sentinel Security Gate — {decision}",
              "",
              "### Vulnerability summary",
              "",
              f"| Severity | Count |",
              f"|----------|-------|",
              f"| 🔴 Critical | {counts.get('CRITICAL', 0)} |",
              f"| 🟠 High     | {counts.get('HIGH', 0)} |",
              f"| 🟡 Medium   | {counts.get('MEDIUM', 0)} |",
              f"| 🔵 Low      | {counts.get('LOW', 0)} |",
              f"| ⚪ Unknown  | {counts.get('UNKNOWN', 0)} |",
          ]

          if vulns_detail:
              lines += [
                  "",
                  "### Critical / High details",
                  "",
                  "| CVE | Severity | Package | Version | Title |",
                  "|-----|----------|---------|---------|-------|",
              ] + vulns_detail[:20]   # cap at 20 rows to keep comment readable

          if len(vulns_detail) > 20:
              lines.append(f"\n_…and {len(vulns_detail) - 20} more. See full Trivy log above._")

          lines += [
              "",
              f"> Scanned image: `{os.environ.get('IMAGE_NAME', '-')}`",
              f"> Ollama/AI analysis: **disabled** (rule-engine only)",
          ]

          body = "\n".join(lines)

          # Write to a file so the next step can read it safely
          with open("pr_comment.md", "w") as out:
              out.write(body)

          print(body)
          EOF
        env:
          GATE_DECISION: ${{ steps.gate.outputs.gate_decision }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      # ── Post comment on PR 
      - name: Post security summary on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: pr_comment.md

  # 3. Deploy only on main, only if both jobs passed
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, security-gate]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -X POST "$deploy_url"
