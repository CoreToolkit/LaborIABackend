name: Backend Deploy

on:
  workflow_run:
    workflows: ["CI · Security Gate · Deploy"]
    types: [completed]

  workflow_dispatch:
    inputs:
      backend_image_tag:
        description: Tag de imagen backend
        required: false
        default: ""

env:
  ACR_NAME: laboriaacr
  IMAGE_NAME: backend
  ACR_URL: laboriaacr.azurecr.io

jobs:
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'feature/infrastructure')

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Login en Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login en ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Generate image tag
        id: meta
        run: |
          SOURCE_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA=$(echo "$SOURCE_SHA" | cut -c1-8)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Image tag: $SHORT_SHA"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image to ACR
        run: |
          docker push ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:latest

  trigger-deploy:
    name: Trigger Terraform Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'feature/infrastructure')

    steps:
      - name: Dispatch to infrastructure repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TERRAFORM_REPO_TOKEN }}
          repository: CoreToolkit/LaborIAInfrastructure
          event-type: backend-updated
          client-payload: |
            {
              "service": "backend",
              "image_tag": "${{ needs.build-and-push.outputs.image_tag }}",
              "commit_sha": "${{ github.event.workflow_run.head_sha || github.sha }}"
            }
